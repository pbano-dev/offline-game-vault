name: Validate repository

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Hygiene, schemas, fixtures, and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: "src:tools"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Reject tracked generated or temporary files
        run: python -B tools/check_repository_hygiene.py --tracked

      - name: Install validator dependency
        run: |
          python -m pip install             --disable-pip-version-check             -r requirements-ci.txt

      - name: Validate repository metadata
        run: python -B tools/validate_repository.py

      - name: Run unit tests without writing bytecode
        run: python -B -m unittest discover -s tests -v

      - name: Reject files generated during CI
        run: python -B tools/check_repository_hygiene.py --filesystem

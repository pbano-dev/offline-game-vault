name: Validate repository

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Schemas and fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Validate repository metadata
        run: python tools/validate_repository.py
